name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt into Node.js 24

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Ensure this is the latest version

    - name: Set up Node.js
      uses: actions/setup-java@v4 # Ensure this is the latest version
      with:
        distribution: 'adopt'
        java-version: '17' # Replace with the Java version your project requires
