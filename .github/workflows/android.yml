name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # গিটহাবের পুরনো সব ক্যাশ বা জ্যাম পরিষ্কার করার কমান্ড
    - name: Clean Gradle Cache
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf .gradle/
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ফ্রেশ ক্লিন বিল্ড রান করার কমান্ড
    - name: Build with Gradle
      run: ./gradlew clean assembleRelease
